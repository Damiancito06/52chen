<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>52chen</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:40px;
}

input, textarea{
  width:100%;
  padding:10px;
  background:#1b1b1b;
  color:white;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

textarea{
  height:100px;
  resize:none;
}

button{
  padding:10px 20px;
  background:#6c4cff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.post{
  background:#1b1b1b;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.alias{
  color:#8f7cff;
  font-weight:bold;
  margin-bottom:10px;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

</style>

</head>

<body>

<h1>52chen</h1>

<input
  id="aliasInput"
  placeholder="Alias (optional)"
>

<textarea
  id="postInput"
  placeholder="Write something anonymous..."
></textarea>

<input
  type="file"
  id="imageInput"
>

<button onclick="createPost()">
Post
</button>

<div id="posts"></div>

<script>

const supabaseUrl = "https://ivivvvbugwbtygqygwku.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aXZ2dmJ1Z3didHlncXlnd2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQ4NjcsImV4cCI6MjA5NDI3MDg2N30.wJJutYE6zS4sZ34XhTXWpyCGwmCVIWLtOatHVJr_gBo";

const supabaseClient =
  supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

async function createPost(){

  const alias =
    document.getElementById("aliasInput").value;

  const content =
    document.getElementById("postInput").value;

  const imageFile =
    document.getElementById("imageInput").files[0];

  let imageUrl = null;

  if(imageFile){

    const fileName =
      Date.now() + "-" + imageFile.name;

    const { error: uploadError } =
      await supabaseClient.storage
        .from("images")
        .upload(fileName, imageFile);

    if(uploadError){
      console.log(uploadError);
      return;
    }

    imageUrl =
      supabaseUrl +
      "/storage/v1/object/public/images/" +
      fileName;

  }

  const finalAlias =
    alias.trim() === ""
    ? "Anonymous"
    : alias;

  const { error } =
    await supabaseClient
      .from("posts")
      .insert([
        {
          alias: finalAlias,
          content: content,
          image_url: imageUrl
        }
      ]);

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("postInput").value = "";

  document.getElementById("imageInput").value = "";

}

async function loadPosts(){

  const { data, error } =
    await supabaseClient
      .from("posts")
      .select("*")
      .order(
        "created_at",
        {
          ascending:false
        }
      );

  if(error){
    console.log(error);
    return;
  }

  const postsDiv =
    document.getElementById("posts");

  postsDiv.innerHTML = "";

  data.forEach(post => {

    postsDiv.innerHTML += `
      <div class="post">

        <div class="alias">
          ${post.alias}
        </div>

        <div>
          ${post.content}
        </div>

        ${
          post.image_url
          ?
          `<img src="${post.image_url}">`
          :
          ""
        }

      </div>
    `;

  });

}

loadPosts();

supabaseClient

.channel("realtime posts")

.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"posts"
  },

  payload => {

    loadPosts();

  }

)

.subscribe();

</script>

</body>
</html>
