<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>52chen</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body{
      background:#111;
      color:white;
      font-family:Arial;
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    h1{
      text-align:center;
      font-size:40px;
    }

    textarea{
      width:100%;
      height:100px;
      background:#1b1b1b;
      color:white;
      border:none;
      border-radius:10px;
      padding:10px;
      resize:none;
      font-size:16px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      background:#6c4cff;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    .post{
      background:#1b1b1b;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
      word-wrap:break-word;
    }

  </style>

</head>

<body>

<h1>52chen</h1>

<textarea
  id="postInput"
  placeholder="Write something anonymous..."
></textarea>

<br>

<button onclick="createPost()">
Post
</button>

<div id="posts"></div>

<script>

const supabaseUrl = "https://ivivvvbugwbtygqygwku.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aXZ2dmJ1Z3didHlncXlnd2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQ4NjcsImV4cCI6MjA5NDI3MDg2N30.wJJutYE6zS4sZ34XhTXWpyCGwmCVIWLtOatHVJr_gBo";

const supabaseClient =
  supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

async function createPost(){

  const input =
    document.getElementById("postInput");

  const content =
    input.value;

  if(content.trim() === ""){
    return;
  }

  const { error } =
    await supabaseClient
      .from("posts")
      .insert([
        {
          content: content
        }
      ]);

  if(error){
    console.log(error);
    return;
  }

  input.value = "";

}

async function loadPosts(){

  const { data, error } =
    await supabaseClient
      .from("posts")
      .select("*")
      .order(
        "created_at",
        {
          ascending:false
        }
      );

  if(error){
    console.log(error);
    return;
  }

  const postsDiv =
    document.getElementById("posts");

  postsDiv.innerHTML = "";

  data.forEach(post => {

    postsDiv.innerHTML += `
      <div class="post">
        ${post.content}
      </div>
    `;

  });

}

loadPosts();

supabaseClient

  .channel("posts-channel")

  .on(
    "postgres_changes",
    {
      event: "*",
      schema: "public",
      table: "posts"
    },

    payload => {

      loadPosts();

    }

  )

  .subscribe();

</script>

</body>
</html>
