<!DOCTYPE html>
<html>

<head>
  <title>52chen</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    body{
      background:#111;
      color:white;
      font-family:Arial;
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    textarea{
      width:100%;
      height:100px;
      background:#1b1b1b;
      color:white;
      border:none;
      padding:10px;
      border-radius:10px;
    }

    button{
      margin-top:10px;
      padding:10px 20px;
      background:#6c4cff;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .post{
      background:#1b1b1b;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
    }

  </style>

</head>

<body>

<h1>52chen</h1>

<textarea id="postInput"></textarea>

<br>

<button onclick="createPost()">
Post
</button>

<div id="posts"></div>

<script>

const supabaseUrl = "https://ivivvvbugwbtygqygwku.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2aXZ2dmJ1Z3didHlncXlnd2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTQ4NjcsImV4cCI6MjA5NDI3MDg2N30.wJJutYE6zS4sZ34XhTXWpyCGwmCVIWLtOatHVJr_gBo";

const supabaseClient = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function createPost(){

  const content =
    document.getElementById("postInput").value;

  if(content === "") return;

  await supabaseClient
    .from("posts")
    .insert([
      {
        content: content
      }
    ]);

  document.getElementById("postInput").value = "";

 
}

async function loadPosts(){

  const { data, error } =
    await supabaseClient
    .from("posts")
    .select("*")
    .order("created_at", {
      ascending:false
    });
  
console.log(data);
console.log(error);
  
  const postsDiv =
    document.getElementById("posts");

  postsDiv.innerHTML = "";

  data.forEach(post => {

    postsDiv.innerHTML += `
      <div class="post">
        ${post.content}
      </div>
    `;

  });

}

loadPosts();

supabaseClient
  .channel('posts-channel')

  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: 'posts'
    },

    payload => {
      loadPosts();
    }

  )

  .subscribe();

</script>

</body>
</html>
