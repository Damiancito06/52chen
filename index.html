<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>52chen</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:40px;
}

input{
  width:100%;
  padding:10px;
  background:#1b1b1b;
  color:white;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

textarea{
  width:100%;
  height:100px;
  background:#1b1b1b;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  resize:none;
  font-size:16px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:#6c4cff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.post{
  background:#1b1b1b;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

.alias{
  color:#8f7cff;
  font-weight:bold;
  margin-bottom:10px;
}

</style>

</head>

<body>

<h1>52chen</h1>

<input
  id="aliasInput"
  placeholder="Alias (optional)"
>

<textarea
  id="postInput"
  placeholder="Write something anonymous..."
></textarea>

<br>

<button onclick="createPost()">
Post
</button>

<div id="posts"></div>

<script>

const supabaseUrl = "TU_URL";

const supabaseKey = "TU_KEY";

const supabaseClient =
  supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

async function createPost(){

  const alias =
    document.getElementById("aliasInput").value;

  const content =
    document.getElementById("postInput").value;

  if(content.trim() === ""){
    return;
  }

  const finalAlias =
    alias.trim() === ""
    ? "Anonymous"
    : alias;

  const { error } =
    await supabaseClient
      .from("posts")
      .insert([
        {
          alias: finalAlias,
          content: content
        }
      ]);

  if(error){
    console.log(error);
    return;
  }

  document.getElementById("postInput").value = "";

}

async function loadPosts(){

  const { data, error } =
    await supabaseClient
      .from("posts")
      .select("*")
      .order(
        "created_at",
        {
          ascending:false
        }
      );

  if(error){
    console.log(error);
    return;
  }

  const postsDiv =
    document.getElementById("posts");

  postsDiv.innerHTML = "";

  data.forEach(post => {

    postsDiv.innerHTML += `
      <div class="post">

        <div class="alias">
          ${post.alias}
        </div>

        <div>
          ${post.content}
        </div>

      </div>
    `;

  });

}

loadPosts();

supabaseClient

.channel("realtime posts")

.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"posts"
  },

  payload => {

    loadPosts();

  }

)

.subscribe();

</script>

</body>
</html>
